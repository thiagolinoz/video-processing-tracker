services:
  dynamodb-local-processing:
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    image: "amazon/dynamodb-local:latest"
    container_name: dynamodb-local-processing
    ports:
      - "8000:8000"
    restart: no
    volumes:
      - "./data:/home/dynamodblocalprocessing/data"

  dynamodb:
    image: "aaronshaf/dynamodb-admin"
    container_name: dynamodb-admin-processing
    depends_on:
      - dynamodb-local-processing
    restart: no
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local-processing:8000
      - AWS_REGION=ap-southeast-1
