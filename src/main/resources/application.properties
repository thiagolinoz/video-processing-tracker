spring.application.name=video-processing-tracker

#aws dynamo
#aws.dynamodb.endpoint=http://localhost:8000
aws.dynamodb.endpoint=https://dynamodb.us-east-1.amazonaws.com
aws.dynamodb.create-tables=false
aws.region=us-east-1

#kafka
#kafka.bootstrap-servers=localhost:9092
kafka.bootstrap-servers=10.0.10.184:9092
kafka.consumer.group-id=seu-grupo-v2

spring.kafka.bootstrap-servers=${kafka.bootstrap-servers}
spring.kafka.consumer.group-id=${kafka.consumer.group-id}
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.missing-topics-fatal=false

# Logging
logging.level.br.com.fiap_postech: DEBUG
logging.level.org.springframework.kafka: DEBUG
logging.level.com.amazonaws: WARN

# Configuracoes do Servidor SMTP do Gmail
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=videopostech@gmail.com
#spring.mail.password=${MAIL_PASSWORD}

# Protocolos de Seguranca
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true